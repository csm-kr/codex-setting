name: Cross-platform check

on:
  push:
  pull_request:

jobs:
  install-and-verify:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
      - run: node -e "require('node:fs').mkdirSync('.installer-test')"
      - run: node install.mjs install .installer-test
      - run: node install.mjs status .installer-test
      - run: node install.mjs uninstall .installer-test
